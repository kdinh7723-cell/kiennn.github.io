<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bố Kiên ios 🇻🇳</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom,#dce8f7,#ffffff);
    text-align:center;
    animation: fadeIn 1.2s ease;
}

/* mở web mượt */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.container{
    padding:25px;
}

/* avatar */
.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid rgba(255,255,255,0.9);

    box-shadow:
        0 0 15px rgba(0,140,255,0.6),
        0 0 35px rgba(0,140,255,0.4),
        0 0 60px rgba(0,140,255,0.3);

    animation: floatGlow 3s ease-in-out infinite;
}

@keyframes floatGlow{
    0%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
    100%{
        transform:translateY(0);
    }
}

h2{
    margin-top:15px;
    color:#444;
}

h1{
    margin-top:8px;
    font-size:35px;
}

.subtitle{
    color:#6d5dfc;
    font-weight:bold;
    margin-top:8px;
}

/* nút social */
.social{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:25px;
}

.social a{
    width:65px;
    height:65px;
    background:white;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    text-decoration:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.social a:hover{
    transform:scale(1.1);
}

/* card */
.card{
    background:white;
    margin:20px;
    padding:22px;
    border-radius:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.btn{
    background:linear-gradient(to right,#4facfe,#00c6ff);
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:15px;
    font-weight:bold;
}

.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:black;
    color:white;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:25px;
}
</style>
</head>

<body>

<div class="container">

<!-- ẢNH ĐẠI DIỆN -->
<img src="avatar.jpg" class="avatar">

<h2>Hi, I am</h2>
<h1>Bố Kiên ios 🇻🇳</h1>

<p class="subtitle">
Chia sẻ App • Game • iOS
</p>

<!-- Facebook -->
<div class="social">
<a href="https://www.facebook.com/share/18ZX6LEz1y/?mibextid=wwXIfr">
📘
</a>
</div>

<!-- card -->
<div class="card">
<span>Facebook cá nhân</span>

<a class="btn"
href="https://www.facebook.com/share/18ZX6LEz1y/?mibextid=wwXIfr">
Mở
</a>
</div>

<div class="card">
<span>Kho App VIP</span>
<a class="btn" href="#">
⬇
</a>
</div>

<div class="card">
<span>Game Mod</span>
<a class="btn" href="#">
⬇
</a>
</div>

</div>

<!-- NHẠC -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" onclick="toggleMusic()">
🎵
</div>

<script>
let isPlaying=false;

function toggleMusic(){
const music=document.getElementById("music");

if(isPlaying){
music.pause();
}else{
music.play();
}

isPlaying=!isPlaying;
}
</script>

</body>
</html>
