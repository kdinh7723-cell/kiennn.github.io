<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bố Kiên ios🇻🇳</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#0f172a,#111827,#1e293b,#000);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:30px;
box-shadow:0 0 40px rgba(255,255,255,0.15);
animation:fadeIn 1.5s ease;
width:90%;
max-width:350px;
z-index:2;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #00eaff;
box-shadow:
0 0 15px #00eaff,
0 0 30px #00eaff,
0 0 60px #00eaff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
transform:scale(1);
}
to{
transform:scale(1.05);
}
}

.name{
margin-top:15px;
font-size:28px;
font-weight:bold;
color:white;
text-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 40px #00eaff;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.03);
}
}

.fb-btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
border-radius:50px;
text-decoration:none;
color:white;
font-size:18px;
font-weight:bold;
background:linear-gradient(45deg,#1877f2,#00c6ff);
box-shadow:0 0 20px rgba(24,119,242,.5);
transition:.3s;
}

.fb-btn:hover{
transform:scale(1.08);
}

.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.7;
animation:float 10s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
10%{opacity:1;}
100%{
transform:translateY(-100vh);
opacity:0;
}
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="tiktok_audio.mp3" type="audio/mpeg">
</audio>

<div class="container">
<img src="./IMG_1477.jpeg" class="avatar">

<div class="name">
Bố Kiên ios🇻🇳
</div>

<a class="fb-btn"
href="https://www.facebook.com/share/18ZX6LEz1y/?mibextid=wwXIfr"
target="_blank">
Facebook của tôi
</a>
</div>

<script>
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";
p.style.opacity=Math.random();
document.body.appendChild(p);
}
</script>

</body>
</html>
