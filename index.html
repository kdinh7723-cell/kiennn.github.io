<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bố Kiên iOS 🇻🇳</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
min-height:100vh;
overflow-x:hidden;
color:white;
animation:fade 1.2s ease;
}

/* hiệu ứng mở web */
@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* nền glow */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(0,140,255,.15);
filter:blur(60px);
animation:move 10s infinite alternate;
}

.c1{
width:200px;
height:200px;
top:10%;
left:5%;
}

.c2{
width:300px;
height:300px;
bottom:10%;
right:5%;
}

@keyframes move{
from{
transform:translateY(0px);
}
to{
transform:translateY(-30px);
}
}

.container{
padding:30px 20px;
text-align:center;
}

/* avatar */
.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,.8);

box-shadow:
0 0 20px rgba(0,140,255,.8),
0 0 50px rgba(0,140,255,.5),
0 0 90px rgba(0,140,255,.4);

animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

h2{
margin-top:18px;
font-weight:normal;
opacity:.8;
}

h1{
font-size:34px;
margin-top:8px;
text-shadow:0 0 15px rgba(0,140,255,.5);
}

.subtitle{
margin-top:10px;
color:#60a5fa;
font-size:18px;
}

/* nút */
.social{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.social a{
width:70px;
height:70px;
border-radius:20px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
text-decoration:none;
transition:.3s;
box-shadow:0 0 20px rgba(255,255,255,.1);
}

.social a:hover{
transform:scale(1.08);
}

/* card */
.card{
margin-top:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:25px;
padding:22px;
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
box-shadow:0 0 20px rgba(255,255,255,.08);
}

.card:hover{
transform:translateY(-5px);
}

.btn{
background:linear-gradient(to right,#2563eb,#38bdf8);
padding:12px 20px;
border-radius:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* nút nhạc */
.music{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
border-radius:50%;
background:#2563eb;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
box-shadow:0 0 20px rgba(37,99,235,.7);
cursor:pointer;
}
</style>
</head>

<body>

<div class="bg">
<div class="circle c1"></div>
<div class="circle c2"></div>
</div>

<div class="container">

<!-- avatar -->
<img src="./IMG_1477.jpeg" class="avatar">

<h2>Hi, I am</h2>
<h1>Bố Kiên iOS 🇻🇳</h1>

<p class="subtitle">
App • Game • iOS • VIP
</p>

<div class="social">
<a href="https://www.facebook.com/share/18ZX6LEz1y/?mibextid=wwXIfr">
📘
</a>
</div>

<div class="card">
<span>Facebook cá nhân</span>
<a class="btn"
href="https://www.facebook.com/share/18ZX6LEz1y/?mibextid=wwXIfr">
Mở
</a>
</div>

<div class="card">
<span>Kho App VIP</span>
<a class="btn" href="#">
Vào
</a>
</div>

<div class="card">
<span>Game Mod</span>
<a class="btn" href="#">
Vào
</a>
</div>

</div>

<audio id="bgMusic" autoplay loop>
  <source src="tiktok_audio.mp3" type="audio/mpeg">
</audio>
<script>
document.addEventListener("click", function () {
  document.getElementById("bgMusic").play();
}, { once: true });
</script>

</body>
</html>
