<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bố Kiên iOS 🇻🇳</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#38bdf8,#0ea5e9,#0369a1);
min-height:100vh;
overflow-x:hidden;
color:white;
animation:fade 1.2s ease;
position:relative;
}

/* mở web */
@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* mặt trời mùa hè */
.sun{
position:absolute;
top:40px;
right:30px;
width:100px;
height:100px;
background:#ffd54f;
border-radius:50%;
box-shadow:0 0 80px #ffd54f;
}

/* nền glow */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.12);
filter:blur(70px);
animation:move 8s infinite alternate;
}

.c1{
width:220px;
height:220px;
top:10%;
left:5%;
}

.c2{
width:300px;
height:300px;
bottom:15%;
right:5%;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-25px);}
}

.container{
padding:30px 20px;
text-align:center;
}

/* avatar */
.avatar{
width:145px;
height:145px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,.8);

box-shadow:
0 0 25px rgba(255,255,255,.7),
0 0 60px rgba(56,189,248,.8);

animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

h2{
margin-top:18px;
opacity:.9;
}

h1{
font-size:34px;
margin-top:8px;
text-shadow:0 0 20px rgba(255,255,255,.5);
}

.subtitle{
margin-top:10px;
color:#e0f2fe;
font-size:18px;
}

/* social */
.social{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.social a{
width:70px;
height:70px;
border-radius:20px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
text-decoration:none;
transition:.3s;
box-shadow:0 0 20px rgba(255,255,255,.15);
}

.social a:hover{
transform:scale(1.08);
}

/* card */
.card{
margin-top:20px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
padding:22px;
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
box-shadow:0 0 20px rgba(255,255,255,.12);
}

.card:hover{
transform:translateY(-5px);
}

.btn{
background:linear-gradient(to right,#2563eb,#38bdf8);
padding:12px 20px;
border-radius:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* sóng biển */
.wave{
position:fixed;
left:0;
bottom:0;
width:200%;
height:160px;
background:rgba(255,255,255,.2);
border-radius:43%;
animation:waveMove 10s linear infinite;
}

.wave2{
bottom:-30px;
opacity:.4;
animation-duration:14s;
}

@keyframes waveMove{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-50%);
}
}
</style>
</head>

<body>

<div class="sun"></div>

<div class="bg">
<div class="circle c1"></div>
<div class="circle c2"></div>
</div>

<div class="container">

<img src="./IMG_1477.jpeg" class="avatar">

<h2>Hi, I am</h2>
<h1>Bố Kiên iOS 🇻🇳</h1>

<p class="subtitle">
App • Game • iOS • VIP
</p>

<div class="social">
<a href="https://www.facebook.com/share/18ZX6LEz1y/?mibextid=wwXIfr">📘</a>

<a href="https://www.tiktok.com/@kien.228?_r=1&_t=ZS-96KPY8Q1ult">
🎵
</a>
</div>

<div class="card">
<span>Facebook cá nhân</span>
<a class="btn"
href="https://www.facebook.com/share/18ZX6LEz1y/?mibextid=wwXIfr">
Mở
</a>
</div>

<div class="card">
<span>TikTok cá nhân</span>
<a class="btn"
href="https://www.tiktok.com/@kien.228?_r=1&_t=ZS-96KPY8Q1ult">

</div>

<div class="card">
<span>Kho App VIP</span>
<a class="btn" href="#">
Vào
</a>
</div>

<span>Game Mod</span>

</div>

</div>

</html>
